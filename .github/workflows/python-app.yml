name: Python CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, '3.10', 3.11, 3.12, 3.13]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[pytest,med]  # Installs: pytest, pytest-cov, pytest-html, pylint

      - name: Run pytest with coverage and HTML report
        run: |
          # Run pytest with coverage and HTML report
          pytest \
            --ignore-glob="*mpi*" \
            --cov=c3po \
            --cov-report=html \
            --cov-report=term \
            --html=report.html \
            --self-contained-html \
            -v \
            tests/

      # - name: Upload HTML report
      #   uses: actions/upload-artifact@v4
      #   if: success()
      #   with:
      #     name: pytest-html-report
      #     path: |
      #       report.html
      #       reports/
      #     retention-days: 7

      - name: Run pylint
        run: |
          pylint --rcfile=./sources/.pylintrc c3po
